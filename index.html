<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能体与工具极客导航</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600 flex items-center gap-2">
                🤖 AI Agents & Tools
            </h1>
            <p class="text-sm text-gray-500 hidden sm:block">用自动化程序驱动的极客导航</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
        
        <aside class="w-full md:w-48 shrink-0">
            <h3 class="font-semibold text-gray-400 uppercase tracking-wider text-xs mb-3">分类导航</h3>
            <div class="flex flex-row md:flex-col gap-2 overflow-x-auto" id="tags-container">
                <button onclick="filterTag('全部')" class="px-3 py-2 text-left text-sm rounded-lg font-medium bg-indigo-50 text-indigo-700 cursor-pointer w-full whitespace-nowrap">全部收录</button>
            </div>
        </aside>

        <section class="flex-1">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="tools-grid">
                <div class="p-6 bg-white rounded-xl shadow-sm border border-gray-100 animate-pulse text-gray-400">正在加载数据...</div>
            </div>
        </section>
    </main>

    <script>
        let allTools = [];

        async function fetchTools() {
            try {
                const response = await fetch('http://127.0.0.1:8001/api/tools');
                allTools = await response.json();
                renderTags();
                renderTools(allTools);
            } catch (error) {
                console.error('获取工具失败:', error);
                document.getElementById('tools-grid').innerHTML = '<p class="text-red-500 col-span-full">无法连接到后端，请确保已经运行了 python3 main.py</p>';
            }
        }

        function renderTools(tools) {
            const grid = document.getElementById('tools-grid');
            if(tools.length === 0) {
                grid.innerHTML = '<p class="text-gray-400 col-span-full text-center py-8">该分类暂无收录</p>';
                return;
            }
            grid.innerHTML = tools.map(tool => `
                <div class="p-6 bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-lg transition-all duration-300 flex flex-col justify-between h-full relative overflow-hidden">
                    
                    <div class="absolute top-0 right-0 px-3 py-1 text-xs font-bold rounded-bl-lg 
                        ${tool.type === 'Agent' ? 'bg-purple-600 text-white shadow-sm' : 'bg-blue-500 text-white shadow-sm'}">
                        ${tool.type.toUpperCase()}
                    </div>

                    <div>
                        <div class="flex items-start justify-between mb-4 mt-2">
                            <img src="${tool.logo}" alt="${tool.name}" class="w-14 h-14 rounded-xl bg-gray-100 object-cover border border-gray-200">
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 mb-1">${tool.name}</h3>
                        <p class="text-gray-600 text-sm line-clamp-3 mb-4 leading-relaxed">${tool.description}</p>
                        
                        ${tool.type === 'Agent' ? `
                        <div class="bg-gray-50 rounded-lg p-3 mb-4 border border-gray-100">
                            <div class="flex items-center text-xs text-gray-600 mb-1">
                                <span class="font-semibold w-12">基座:</span> <span class="text-indigo-600">${tool.base_model}</span>
                            </div>
                            <div class="flex items-center text-xs text-gray-600">
                                <span class="font-semibold w-12">框架:</span> <span class="text-purple-600">${tool.framework}</span>
                            </div>
                        </div>
                        ` : ''}
                    </div>

                    <div class="flex items-center justify-between pt-4 mt-auto border-t border-gray-50">
                        <div class="flex flex-col gap-1">
                            <span class="inline-block text-gray-500 text-xs"># ${tool.tag}</span>
                            <span class="text-xs font-medium text-green-600">${tool.pricing}</span>
                        </div>
                        <a href="${tool.url}" target="_blank" class="text-sm font-semibold text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-3 py-2 rounded-lg transition-colors">
                            访问项目
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function renderTags() {
            const tagsContainer = document.getElementById('tags-container');
            const tags = ['全部', ...new Set(allTools.map(t => t.tag))];
            tagsContainer.innerHTML = tags.map(tag => `
                <button onclick="filterTag('${tag}')" class="tag-btn px-3 py-2 text-left text-sm rounded-lg font-medium text-gray-600 hover:bg-gray-100 w-full transition-colors cursor-pointer whitespace-nowrap">
                    ${tag === '全部' ? '全部收录' : tag}
                </button>
            `).join('');
        }

        function filterTag(tag) {
            if (tag === '全部') {
                renderTools(allTools);
            } else {
                const filtered = allTools.filter(t => t.tag === tag);
                renderTools(filtered);
            }
        }

        fetchTools();
    </script>
</body>
</html>
