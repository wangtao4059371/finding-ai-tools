function dim(m,k){return k==='reasoning'?m.re:k==='chinese'?m.ch:k==='coding'?m.co_score:k==='math'?m.ma:k==='hallucination'?m.ha:k==='speed'?m.sp:k==='api_cost'?m.ap:k==='agent'?m.ag:k==='long_text'?m.lt:0}
function avg(m){return(DIMS.reduce(function(s,d){return s+dim(m,d.k)},0)/9).toFixed(1)}

var chart=null, mainIdx=0, compareIdx=-1;

function favicon(url){try{return'https://www.google.com/s2/favicons?domain='+new URL(url).hostname+'&sz=32'}catch(e){return''}}
function init(){
    var sb=document.getElementById('sidebar');
    sb.innerHTML='<div class="sidebar-header">全部模型 ('+M.length+')</div>';
    M.forEach(function(m,i){
        sb.innerHTML+='<div class="sidebar-item" id="si-'+i+'" onclick="selectMain('+i+')"><img src="'+favicon(m.ur)+'" onerror="this.style.display=\'none\'">'+m.nm+'<span class="score-sm">'+avg(m)+'</span></div>';
    });

    var cs=document.getElementById('cmpSel');
    cs.onchange=function(){
        compareIdx=parseInt(this.value);
        if(compareIdx>=0&&compareIdx===mainIdx){compareIdx=-1;this.value='-1';}
        updateCmpBadge();render();
    };

    selectMain(0);
}

function selectMain(i){
    mainIdx=i;compareIdx=-1;
    document.getElementById('cmpSel').value='-1';
    updateCmpBadge();
    M.forEach(function(m,j){document.getElementById('si-'+j).className=j===i?'sidebar-item active':'sidebar-item';});
    document.getElementById('cmn').textContent=M[i].nm;
    rebuildCmpOptions();
    render();
}

function rebuildCmpOptions(){
    var cs=document.getElementById('cmpSel');
    cs.innerHTML='<option value="-1">-- 选择对比模型 --</option>';
    M.forEach(function(m,i){
        if(i!==mainIdx) cs.innerHTML+='<option value="'+i+'">'+m.nm+'</option>';
    });
}

    var badge=document.getElementById('cmpBadge');
    var cn=document.getElementById('cmpName');
    if(compareIdx>=0){badge.classList.remove('hidden');cn.textContent=M[compareIdx].nm;}
    else badge.classList.add('hidden');
}

function clearCompare(){compareIdx=-1;document.getElementById('cmpSel').value='-1';updateCmpBadge();render();}

function render(){
    if(chart){chart.destroy();chart=null}
    var m=M[mainIdx];
    var models=[m];
    if(compareIdx>=0&&compareIdx!==mainIdx)models.push(M[compareIdx]);
    var isCmp=models.length===2;

    document.getElementById('chartTitle').textContent=isCmp?models[0].nm+'  VS  '+models[1].nm:models[0].nm;

    // Chart
    var datasets=models.map(function(mod,i){
        var c=i===0?'rgba(99,102,241,':'rgba(239,68,68,';
        return {label:mod.nm,data:DIMS.map(function(d){return dim(mod,d.k)}),backgroundColor:c+'0.2)',borderColor:c+'0.85)',borderWidth:2.5,pointBackgroundColor:c+'1)',pointRadius:4};
    });

    chart=new Chart(document.getElementById('chart').getContext('2d'),{
        type:'radar',
        data:{labels:DIMS.map(function(d){return d.l}),datasets:datasets},
        options:{responsive:true,scales:{r:{beginAtZero:true,max:10,ticks:{stepSize:2,font:{size:11}},pointLabels:{font:{size:11}}}},plugins:{legend:{display:isCmp,position:'bottom'}}}
    });

    // Tags - show all 9 dimensions
    var tags='';
    DIMS.forEach(function(d){
        var v=dim(m,d.k);
        var cls='', icon='';
        if(v>=9){cls='g';icon='🏆 ';}
        else if(v>=8){cls='';icon='';}
        else if(v>=6){cls='';icon='';}
        else if(v>=4){cls='r';icon='';}
        else{cls='r';icon='⚠️ ';}
        tags+='<span class="tag '+(cls||'n')+'">'+icon+d.l+' '+v+'</span>';
    });
    document.getElementById('dimTags').innerHTML=tags;

    // Left info box
    var box=document.getElementById('infoBox');
    if(isCmp){
        var a=models[0],b=models[1];var rows='<tr><th>维度</th><th>'+a.nm+'</th><th>'+b.nm+'</th></tr>';
        DIMS.forEach(function(d){
            var va=dim(a,d.k),vb=dim(b,d.k);
            rows+='<tr><td>'+d.l+'</td><td class="'+(va>vb?'w':vb>va?'l':'')+'">'+va+'</td><td class="'+(vb>va?'w':va>vb?'l':'')+'">'+vb+'</td></tr>';
        });
        var aa=avg(a),ab=avg(b);
        rows+='<tr style="border-top:2px solid #ddd;font-weight:800"><td>综合评分</td><td class="'+(aa>ab?'w':'l')+'">'+aa+'</td><td class="'+(ab>aa?'w':'l')+'">'+ab+'</td></tr>';
        box.innerHTML='<div style="font-weight:700;margin-bottom:10px;font-size:13px;color:#6366f1">对比详情</div><table class="compare-tbl">'+rows+'</table>';
    }else{
        var a=avg(m);
        box.innerHTML='<div style="text-align:center"><div class="score-num">'+a+'</div><div class="score-lbl">综合评分 / 10</div><div class="bar"><div class="bar-fill" style="width:'+(a*10)+'%"></div></div></div><div class="meta"><strong>'+m.co+'</strong> · '+m.pr+'</div><div class="desc">'+m.de+'</div><a href="'+m.ur+'" target="_blank" class="btn">&#x1F310; 访问官网</a></div>';
        // 保持上方的标签
        document.getElementById('dimTags').innerHTML=tags;
    }
}

init();
</script>
</body>
</html>
